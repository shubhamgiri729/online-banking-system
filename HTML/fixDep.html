<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Deposit | Online Banking Website mini project</title>
    <link href="../CSS/fixDep.css" rel="stylesheet">
    <script src="../Java Script/fixDepJS.js"></script>

<body onload="load();">
    <?php include "header.php"?>
    <main class="fixed">
        <section class="deposit-info">

            <h3>Benefits of Fixed Deposit</h3>

            <p>Safe investment option</p>
            <p>Guaranteed returns</p>
            <p>Flexible deposit duration</p>
            <p>Higher interest rates than savings accounts</p>

        </section>
        <div class="fd-container">
            <h1>Fixed Deposit</h1>

            <form method="POST">

                <div class="form-group">
                    <h3>Account Details</h3>

                    <label>Account Number</label>
                    <input type="text" id="accno" maxlength="16" placeholder="Enter Account Number"
                        onblur="return validAcc();">
                </div>

                <div class="form-group">
                    <h3>Deposit Details</h3>

                    <label>Amount (₹)</label>
                    <input type="number" id="rupee" min="10000" max="500000" placeholder="Min ₹10,000">

                    <label>Duration (Years)</label>
                    <input type="number" min="1" max="10" placeholder="e.g. 5 years">
                </div>

                <div class="form-group">
                    <h3>Payment Details</h3>

                    <label>Card Type</label>
                    <select name="cards">
                        <option value="debit" selected>Debit Card</option>
                        <option value="credit">Credit Card</option>
                    </select>

                    <label>Card Number</label>
                    <input type="text" id="cardno" maxlength="16" placeholder="Enter Card Number"
                        onblur="return validCard();">

                    <label>Name on Card</label>
                    <input type="text" id="name" placeholder="Cardholder Name">

                    <label>CVV</label>
                    <input type="password" maxlength="3" id="cvv" placeholder="3-digit CVV" onblur="right();">

                    <p id="result"></p>
                </div>

                <button type="button" id="paybtn" onclick="goto();">Confirm Deposit</button>

            </form>
        </div>
    </main>
</body>

</html>
